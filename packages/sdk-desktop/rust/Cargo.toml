[package]
name = "waker-sdk-desktop-native"
version = "0.1.0"
edition = "2021"
description = "Native Node addon for @waker/sdk-desktop"
publish = false

[lib]
name = "waker_sdk_desktop_native"
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0"
napi = { version = "2.16", default-features = false, features = ["napi8"] }
napi-derive = "2.16"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2.1"
